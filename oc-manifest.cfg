# oc-manifest.cfg — declares where everything gets installed in-game.
# Lives in the git root. Read by the EEPROM auto-installer
# (installer/stage2.lua) and by 'ocgit install'.
#
# Directives:
#   file <repo path> <target path>          install a single file
#   dir <repo dir> <target dir>             install a whole directory tree
#   label <name>                            set the drive label (installer only)
#   bios <repo path>                        Lua BIOS restored after install
#                                           (default: installer/luabios.lua)
#   openos <owner>/<repo> <branch> <path>   override the OpenOS download source
#
# /usr/bin is on the default OpenOS PATH, so programs installed there run
# by name (ocgit, ocdev, ...). /usr/lib is on the require() path.

# libraries
file ocgit/json.lua      /usr/lib/json.lua
file ocgit/optimize.lua  /usr/lib/optimize.lua
file noteblock/nbs.lua   /usr/lib/nbs.lua

# programs
file ocgit/ocgit.lua     /usr/bin/ocgit.lua
file ocgit/ocdev.lua     /usr/bin/ocdev.lua
file ocgit/ocrun.lua     /usr/bin/ocrun.lua
file ocgit/ocpush.lua    /usr/bin/ocpush.lua
file installer/flash.lua /usr/bin/mkinstaller.lua
file noteblock/noteblock.lua  /usr/bin/noteblock.lua
file noteblock/noteplayer.lua /usr/bin/noteplayer.lua

# support files
file installer/boot.lua     /usr/share/ocinstaller/boot.lua
file installer/netboot.lua  /usr/share/ocinstaller/netboot.lua

label OC-Node
